version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    command: sh -c "npm install && npm run dev"
    depends_on:
      - mongo

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '5173:5173'
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - backend

volumes:
  mongo_data:
